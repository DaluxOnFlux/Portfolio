name: Deploy Portfolio to AWS (K3s)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
          --build-arg VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }} \
          -t ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest
          


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Kubernetes manifests to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/"
          target: "~/projects/portfolio"

      - name: Deploy to K3s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            cd ~/projects/portfolio/k8s
            kubectl create secret generic db-secrets \
            --from-literal=postgres-password='${{ secrets.POSTGRES_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -    
            
            kubectl apply -f .
            
            kubectl rollout restart deployment portfolio