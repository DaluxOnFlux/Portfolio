name: Deploy Portfolio to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/projects/portfolio
            cd ~/projects/portfolio

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest

            docker stop portfolio-site || true
            docker rm portfolio-site || true
            
            docker run -d \
              --name portfolio-site \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-react:latest
            
            docker image prune -f